services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartattend
      POSTGRES_PASSWORD: smartattend_secret
      POSTGRES_DB: smartattend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartattend"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── FastAPI Backend ──────────────────────────────────────────────────
  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartattend:smartattend_secret@db:5432/smartattend
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ML_SERVICE_URL: http://ml:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery Worker ───────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://smartattend:smartattend_secret@db:5432/smartattend
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q default,ml,ml_scoring,reports,notifications

  # ── Celery Beat (Scheduled Tasks) ───────────────────────────────────────
  beat:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://smartattend:smartattend_secret@db:5432/smartattend
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    volumes:
      - ./apps/backend:/app
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info

  # ── ML Service (Face, Anomaly, Forecast) ──────────────────────────────
  ml:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      APP_ENV: development
      MODEL_DIR: /app/models
    ports:
      - "8001:8001"
    volumes:
      - ml_models:/app/models
      - ./apps/ml-service:/app

  # ── Flower (Celery Monitoring UI) ──────────────────────────────────────
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  ml_models:
