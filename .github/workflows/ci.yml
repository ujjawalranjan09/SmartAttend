name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.4.4
      - name: Lint
        run: ruff check apps/backend/
      - name: Format check
        run: ruff format --check apps/backend/

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartattend
          POSTGRES_PASSWORD: smartattend_secret
          POSTGRES_DB: smartattend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 3
    env:
      DATABASE_URL: postgresql+asyncpg://smartattend:smartattend_secret@localhost:5432/smartattend_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test_secret_key_for_ci_only_32ch
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r apps/backend/requirements.txt
      - name: Run migrations
        working-directory: apps/backend
        run: alembic upgrade head
      - name: Run tests
        working-directory: apps/backend
        run: pytest tests/ -v --asyncio-mode=auto --tb=short

  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t smartattend-api:ci ./apps/backend
