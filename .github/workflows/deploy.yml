name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartattend
          POSTGRES_PASSWORD: smartattend_secret
          POSTGRES_DB: smartattend_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 3s --health-retries 3
    env:
      DATABASE_URL: postgresql+asyncpg://smartattend:smartattend_secret@localhost:5432/smartattend_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r apps/backend/requirements.txt
      - run: cd apps/backend && alembic upgrade head
      - run: cd apps/backend && pytest tests/ -v --asyncio-mode=auto --tb=short

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t smartattend-api ./apps/backend
      - run: docker build -t smartattend-ml ./apps/ml-service

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Staging deploy placeholder
        run: echo "Deploy to staging — configure for your hosting provider (Render/Railway/AWS)"
