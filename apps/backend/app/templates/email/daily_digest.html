<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #1976d2;">Daily Attendance Digest</h2>
  <p>Dear {recipient_name},</p>
  <p>Here is your daily attendance summary:</p>
  <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee;">Total Sessions Today</td><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">{total_sessions}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee;">Average Attendance</td><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">{avg_attendance}%</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee;">Proxy Incidents</td><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">{proxy_count}</td></tr>
    <tr><td style="padding: 8px;">At-Risk Students</td><td style="padding: 8px; font-weight: bold;">{at_risk_count}</td></tr>
  </table>
  <p style="margin-top: 24px;">
    <a href="{analytics_url}" style="background: #1976d2; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 4px;">View Analytics</a>
  </p>
  <hr style="margin-top: 32px; border: none; border-top: 1px solid #eee;">
  <p style="font-size: 12px; color: #888;">SmartAttend — AI-Augmented Attendance Monitoring</p>
</body>
</html>
