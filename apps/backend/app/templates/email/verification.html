<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #1976d2;">Verify Your Email</h2>
  <p>Dear {name},</p>
  <p>Welcome to SmartAttend! Please verify your email address by clicking the button below:</p>
  <p style="margin-top: 24px;">
    <a href="{verify_url}" style="background: #1976d2; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 4px;">Verify Email</a>
  </p>
  <p style="margin-top: 16px;">Or use this token: <code>{token}</code></p>
  <p style="margin-top: 16px; color: #888;">This link expires in 24 hours.</p>
  <hr style="margin-top: 32px; border: none; border-top: 1px solid #eee;">
  <p style="font-size: 12px; color: #888;">SmartAttend — AI-Augmented Attendance Monitoring</p>
</body>
</html>
