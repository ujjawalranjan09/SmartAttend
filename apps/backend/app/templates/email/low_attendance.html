<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #d32f2f;">Low Attendance Alert</h2>
  <p>Dear {student_name},</p>
  <p>Your attendance in <strong>{course_name}</strong> has dropped to <strong>{attendance_pct}%</strong>.</p>
  <p>Please ensure you attend upcoming classes to avoid academic penalties.</p>
  <p style="margin-top: 24px;">
    <a href="{dashboard_url}" style="background: #1976d2; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 4px;">View Dashboard</a>
  </p>
  <hr style="margin-top: 32px; border: none; border-top: 1px solid #eee;">
  <p style="font-size: 12px; color: #888;">SmartAttend — AI-Augmented Attendance Monitoring</p>
</body>
</html>
