<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartAttend — Classroom Display</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #ffffff;
      overflow: hidden;
    }

    .display-wrapper {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 2rem;
    }

    /* Header */
    .display-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; flex-direction: column; gap: 0.25rem; }
    .course-name { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .session-time { font-size: 1.1rem; color: #8b949e; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }

    /* Counter center */
    .counter-panel {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem 0;
    }
    .counter-ring {
      position: relative;
      width: 200px;
      height: 200px;
    }
    .counter-ring svg { transform: rotate(-90deg); }
    .counter-ring circle {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
    }
    .ring-bg { stroke: #21262d; }
    .ring-fill { stroke: #4ade80; transition: stroke-dashoffset 0.6s ease; }
    .ring-fill.warning { stroke: #fbbf24; }
    .ring-fill.low { stroke: #f87171; }
    .counter-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .counter-main { font-size: 3.5rem; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
    .counter-sub { font-size: 1rem; color: #8b949e; margin-top: 0.25rem; }
    .counter-pct { font-size: 2rem; font-weight: 700; color: #4ade80; }
    .counter-pct.warning { color: #fbbf24; }
    .counter-pct.low { color: #f87171; }

    /* Student list */
    .student-list-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title { font-size: 1rem; font-weight: 600; }
    .panel-count { font-size: 0.875rem; color: #8b949e; background: #21262d; padding: 0.25rem 0.75rem; border-radius: 999px; }
    .student-scroll { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .student-scroll::-webkit-scrollbar { width: 4px; }
    .student-scroll::-webkit-scrollbar-track { background: transparent; }
    .student-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
    .student-entry {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 0.5rem;
      animation: slideInRight 0.4s ease;
    }
    .student-entry:hover { background: #21262d; }
    .entry-check {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid #4ade80;
      display: flex; align-items: center; justify-content: center;
      color: #4ade80;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .entry-info { flex: 1; }
    .entry-name { font-size: 1rem; font-weight: 500; }
    .entry-roll { font-size: 0.8rem; color: #8b949e; }
    .entry-time { font-size: 0.8rem; color: #8b949e; font-variant-numeric: tabular-nums; }
    .empty-list { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #484f58; font-size: 1.1rem; gap: 0.5rem; }

    /* Bottom bar */
    .display-footer {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #30363d;
      padding-top: 1rem;
    }
    .footer-logo { font-size: 1rem; font-weight: 700; color: #4f98a3; letter-spacing: -0.02em; }
    .timer { font-size: 1.1rem; font-weight: 600; font-variant-numeric: tabular-nums; color: #8b949e; }
    .reconnecting-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(13,17,23,0.9);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      font-size: 1.25rem;
      z-index: 100;
    }
    .reconnecting-overlay.visible { display: flex; }
    .reconnecting-spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #4f98a3; border-radius: 50%; animation: spin 1s linear infinite; }

    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }

    /* Live dot */
    .live-dot { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 600; color: #4ade80; text-transform: uppercase; letter-spacing: 0.08em; }
    .live-dot::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }

    /* Progress ring numbers */
    .ring-circumference { stroke-dasharray: 565; stroke-dashoffset: 565; }
  </style>
</head>
<body>

<div class="reconnecting-overlay" id="reconnect-overlay">
  <div class="reconnecting-spinner"></div>
  <div>Reconnecting<span id="reconnect-dots">...</span></div>
</div>

<div class="display-wrapper">
  <!-- Header -->
  <div class="display-header">
    <div class="header-left">
      <div id="course-name" class="course-name">—</div>
      <div id="session-time" class="session-time">Session starting...</div>
    </div>
    <div class="header-right">
      <div class="live-dot">Live</div>
      <div id="session-status" style="font-size:0.9rem;color:#8b949e"></div>
    </div>
  </div>

  <!-- Counter -->
  <div class="counter-panel">
    <div class="counter-ring">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle class="ring-bg ring-circumference" cx="100" cy="100" r="90"/>
        <circle class="ring-fill ring-circumference" id="ring-progress" cx="100" cy="100" r="90"/>
      </svg>
      <div class="counter-value">
        <div class="counter-main"><span id="present-count">0</span><span style="font-size:1.5rem;color:#8b949e;font-weight:400">/<span id="total-count">0</span></span></div>
        <div class="counter-sub">present</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:center">
      <div class="counter-pct" id="pct-display">—%</div>
      <div style="font-size:0.9rem;color:#8b949e">Attendance</div>
    </div>
  </div>

  <!-- Student list -->
  <div class="student-list-panel">
    <div class="panel-header">
      <div class="panel-title">Checked In</div>
      <div class="panel-count" id="list-count">0</div>
    </div>
    <div class="student-scroll" id="student-list">
      <div class="empty-list" id="empty-list">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Waiting for students...</span>
      </div>
    </div>
  </div>

  <!-- Spacer for grid layout balance -->
  <div></div>

  <!-- Footer -->
  <div class="display-footer">
    <div class="footer-logo">SmartAttend</div>
    <div class="timer" id="session-timer">00:00:00</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');
const token = params.get('token');

if (!sessionId || !token) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;font-size:1.25rem;color:#f87171"><div>Invalid display link</div><div style="font-size:0.9rem;color:#8b949e">Missing session_id or token</div></div>';
  throw new Error('Missing params');
}

const API_BASE = window.API_BASE || 'http://localhost:8000/api/v1';
const WS_BASE = (window.API_BASE || 'http://localhost:8000').replace(/^http/, 'ws');

// State
let presentStudents = [];  // [{student_name, roll_number, marked_at}]
let totalEnrolled = 0;
let presentCount = 0;
let sessionStartTime = null;
let timerInterval = null;

// ─── Fetch initial data ──────────────────────────────────────────────────────
async function loadInitial() {
  try {
    const res = await fetch(`${API_BASE}/display/session/${sessionId}?token=${encodeURIComponent(token)}`);
    if (!res.ok) throw new Error('Invalid token or session');
    const data = await res.json();
    applyData(data);
    connectWS();
  } catch (e) {
    document.getElementById('course-name').textContent = 'Session Unavailable';
    document.getElementById('session-time').textContent = e.message;
  }
}

function applyData(data) {
  document.getElementById('course-name').textContent = data.course_name || '—';
  document.getElementById('session-time').textContent = data.course_code || '';

  if (data.start_time) {
    sessionStartTime = new Date(data.start_time);
    startTimer();
  }

  totalEnrolled = data.total_enrolled || 0;
  presentCount = data.present_count || 0;
  presentStudents = data.present_students || [];
  renderStudents();
  updateCounter();
}

// ─── Counter ──────────────────────────────────────────────────────────────────
function updateCounter() {
  const pct = totalEnrolled > 0 ? Math.round((presentCount / totalEnrolled) * 100) : 0;
  const ring = document.getElementById('ring-progress');
  const circumf = 2 * Math.PI * 90;
  const offset = circumf - (pct / 100) * circumf;
  ring.style.strokeDashoffset = offset;
  ring.className = 'ring-fill ring-circumference' + (pct >= 75 ? '' : pct >= 60 ? ' warning' : ' low');

  const pctEl = document.getElementById('pct-display');
  pctEl.textContent = pct + '%';
  pctEl.className = 'counter-pct' + (pct >= 75 ? '' : pct >= 60 ? ' warning' : ' low');

  document.getElementById('present-count').textContent = presentCount;
  document.getElementById('total-count').textContent = totalEnrolled;
  document.getElementById('list-count').textContent = presentCount;
}

// ─── Student list ────────────────────────────────────────────────────────────
function renderStudents() {
  const list = document.getElementById('student-list');
  const empty = document.getElementById('empty-list');
  if (!presentStudents.length) {
    if (empty) empty.style.display = 'flex';
    return;
  }
  if (empty) empty.style.display = 'none';
  // Sort: most recent first
  const sorted = [...presentStudents].sort((a, b) => new Date(b.marked_at) - new Date(a.marked_at));
  list.innerHTML = sorted.map(s => {
    const time = s.marked_at ? new Date(s.marked_at).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';
    return `<div class="student-entry">
      <div class="entry-check">✓</div>
      <div class="entry-info">
        <div class="entry-name">${s.student_name || '—'}</div>
        <div class="entry-roll">${s.roll_number || 'N/A'}</div>
      </div>
      <div class="entry-time">${time}</div>
    </div>`;
  }).join('');
}

// ─── Timer ───────────────────────────────────────────────────────────────────
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!sessionStartTime) return;
    const diff = Math.floor((Date.now() - sessionStartTime.getTime()) / 1000);
    const h = String(Math.floor(diff / 3600)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
    const s = String(diff % 60).padStart(2, '0');
    document.getElementById('session-timer').textContent = `${h}:${m}:${s}`;
  }, 1000);
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
let ws = null;
let reconnectAttempts = 0;
let reconnectTimeout = null;
const MAX_RECONNECT_DELAY = 30000;

function connectWS() {
  const url = `${WS_BASE}/ws/session/${sessionId}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    reconnectAttempts = 0;
    document.getElementById('reconnect-overlay').classList.remove('visible');
    ws.send('ping'); // trigger connection alive
  };

  ws.onmessage = (event) => {
    if (event.data === 'pong') return;
    try {
      const msg = JSON.parse(event.data);
      if (msg.event !== 'attendance_marked') return;
      // Add new student
      const newEntry = { student_name: msg.student_name, roll_number: msg.roll_number, marked_at: msg.marked_at };
      const existing = presentStudents.findIndex(s => s.student_name === msg.student_name);
      if (existing >= 0) presentStudents[existing] = newEntry;
      else presentStudents.push(newEntry);
      presentCount = msg.present_count;
      totalEnrolled = msg.total_enrolled || totalEnrolled;
      renderStudents();
      updateCounter();
      flashCounter();
    } catch {}
  };

  ws.onclose = ws.onerror = () => {
    document.getElementById('reconnect-overlay').classList.add('visible');
    scheduleReconnect();
  };
}

function scheduleReconnect() {
  if (reconnectTimeout) clearTimeout(reconnectTimeout);
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
  reconnectAttempts++;
  reconnectTimeout = setTimeout(connectWS, delay);
}

function flashCounter() {
  const el = document.querySelector('.counter-value');
  el.style.transition = 'transform 0.1s';
  el.style.transform = 'scale(1.08)';
  setTimeout(() => { el.style.transform = ''; }, 200);
}

// ─── Boot ────────────────────────────────────────────────────────────────────
loadInitial();

// Auto-refresh after 3 hours
setTimeout(() => {
  window.location.reload();
}, 3 * 60 * 60 * 1000);
</script>
</body>
</html>
